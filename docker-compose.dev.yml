# Development overrides — run with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - ./apps/api/app:/app/app
    environment:
      ENVIRONMENT: development
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/index.html:/app/index.html
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8001/api

  mongo-express:
    image: mongo-express:latest
    container_name: wise-trade-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-changeme}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
